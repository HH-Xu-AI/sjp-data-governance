<!DOCTYPE html>
<html lang="zh-CN">
<head>

<title>竹沥双降片·全流程数据治理系统 V3.0</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0e1a;--card:#111827;--card2:#1a2235;--border:#1e2d45;--accent:#00e5a0;--accent2:#3b82f6;--accent3:#f59e0b;--text:#e2e8f0;--muted:#64748b}
html,body{height:100%;overflow:hidden;font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text)}
#app{height:100vh;display:flex;flex-direction:column}
.header{background:linear-gradient(135deg,#0d1520,#111827);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;gap:12px;flex-shrink:0;z-index:10}
.logo strong{font-size:20px;font-weight:800;background:linear-gradient(135deg,#00e5a0,#3b82f6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.logo small{display:block;font-size:10px;color:var(--muted);letter-spacing:.05em}
.hc{flex:1;display:flex;gap:4px;padding:0 12px;border-left:1px solid var(--border);border-right:1px solid var(--border);overflow-x:auto}
.h-tab{padding:5px 14px;border-radius:6px;font-size:12px;cursor:pointer;white-space:nowrap;border:1px solid transparent;color:var(--muted);background:transparent;flex-shrink:0}
.h-tab:hover{color:var(--text);border-color:var(--border)}
.h-tab.on{font-weight:700;border-color:currentColor;background:rgba(255,255,255,.05)}
.badge{background:var(--card2);border:1px solid var(--border);border-radius:6px;padding:3px 10px;font-size:10px;color:var(--muted);display:flex;flex-direction:column;align-items:center;flex-shrink:0}
.badge strong{color:var(--accent);font-size:14px;font-weight:700}
.main{display:flex;flex:1;overflow:hidden;min-height:0}
.left{width:260px;flex-shrink:0;border-right:1px solid var(--border);background:var(--card);display:flex;flex-direction:column;overflow:hidden}
.st{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);padding:8px 12px 5px;border-bottom:1px solid var(--border);flex-shrink:0}
.ls{flex:1;overflow-y:auto;padding:6px}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.ai{background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:9px 11px;margin-bottom:5px;position:relative;overflow:hidden}
.ai::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:3px 0 0 3px;background:var(--c,#00e5a0)}
.ai:hover{border-color:var(--c,#00e5a0)}
.ait{font-size:12px;font-weight:700;margin-bottom:3px}
.aid{font-size:10px;color:var(--muted);line-height:1.5}
.di{display:flex;align-items:center;gap:6px;padding:5px 7px;border-radius:6px;margin-bottom:3px;background:var(--card2);border:1px solid var(--border);cursor:pointer}
.di:hover{border-color:var(--accent3)}
.sv{width:18px;height:18px;border-radius:4px;font-size:9px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sv-h{background:rgba(239,68,68,.15);color:#ef4444;border:1px solid rgba(239,68,68,.3)}
.sv-c{background:rgba(168,85,247,.15);color:#a855f7;border:1px solid rgba(168,85,247,.3)}
.sv-m{background:rgba(245,158,11,.15);color:#f59e0b;border:1px solid rgba(245,158,11,.3)}
.dt{font-size:10px;color:var(--muted);flex:1;line-height:1.3}
.da{font-size:10px;color:var(--accent3);font-weight:700;white-space:nowrap}
.center{flex:1;overflow-y:auto;overflow-x:hidden;padding:14px 16px;min-width:0}
.kb{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.kc{background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:4px 12px;font-size:11px;display:flex;align-items:center;gap:6px;flex-shrink:0}
.kc .dot{width:7px;height:7px;border-radius:50%}
.kc .n{color:var(--text);font-weight:700}
.ss-sec{margin-bottom:18px}
.ss-hdr{display:flex;align-items:center;gap:10px;margin-bottom:10px;padding:9px 14px;background:var(--card2);border:1px solid var(--border);border-radius:10px;cursor:pointer;position:relative;overflow:hidden}
.ss-hdr::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;border-radius:10px 0 0 10px;background:var(--sc,#00e5a0)}
.ss-hdr:hover{border-color:var(--sc,#00e5a0)}
.ss-hdr .icon{font-size:17px}
.ss-hdr .name{font-size:14px;font-weight:800;color:var(--sc,#00e5a0)}
.ss-hdr .meta{font-size:11px;color:var(--muted);margin-left:auto}
.ss-hdr .cnt{background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:10px;padding:1px 8px;font-size:11px;font-weight:700}
.ss-hdr .arr{margin-left:6px;color:var(--muted);font-size:10px;transition:transform .2s}
.ss-hdr.open .arr{transform:rotate(90deg)}
.ssl{padding-left:16px;border-left:2px solid var(--border);margin-left:14px}
.ssb{margin-bottom:8px}
.ssh{font-size:10px;color:var(--muted);padding:3px 8px;display:flex;align-items:center;gap:5px}
.ssh .dot{width:5px;height:5px;border-radius:50%;background:var(--muted)}
.mods{display:flex;flex-wrap:wrap;gap:7px;padding-left:8px;margin-top:4px}
.mc{display:flex;flex-direction:column;gap:3px;padding:9px 12px;background:var(--card2);border:1px solid var(--border);border-radius:9px;cursor:pointer;transition:all .2s;min-width:160px;max-width:220px;flex:1;position:relative;overflow:hidden}
.mc:hover{border-color:var(--sc,#00e5a0);transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,.3)}
.mc.act{border-color:var(--accent);box-shadow:0 0 0 2px rgba(0,229,160,.15)}
.mid{font-size:9px;color:var(--muted);font-weight:700;font-family:monospace}
.mn{font-size:12px;font-weight:700;color:var(--text)}
.ms{font-size:10px;color:var(--muted);line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.mf{display:flex;flex-wrap:wrap;gap:2px;margin-top:2px}
.ft{font-size:8px;padding:1px 4px;border-radius:3px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);color:var(--muted)}
.l3{position:absolute;top:5px;right:5px;font-size:8px;background:rgba(0,229,160,.12);color:#00e5a0;border:1px solid rgba(0,229,160,.25);padding:1px 4px;border-radius:3px;font-weight:700}
.right{width:310px;flex-shrink:0;border-left:1px solid var(--border);background:var(--card);display:flex;flex-direction:column;overflow:hidden}
.rt{display:flex;border-bottom:1px solid var(--border);flex-shrink:0}
.rt>div{flex:1;padding:7px 0;font-size:10px;cursor:pointer;text-align:center;color:var(--muted);border-bottom:2px solid transparent}
.rt>div.on{color:var(--accent);border-bottom-color:var(--accent)}
.rb{flex:1;overflow-y:auto;padding:10px}
.dsec{margin-bottom:10px}
.dst{font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px;padding-bottom:3px;border-bottom:1px solid var(--border)}
.dsb{font-size:11px;color:var(--muted);line-height:1.7}
.sg{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:10px}
.st-c{background:var(--card2);border:1px solid var(--border);border-radius:7px;padding:9px;text-align:center}
.st-c .v{font-size:18px;font-weight:800;color:var(--accent)}
.st-c .l{font-size:9px;color:var(--muted);margin-top:1px}
.bg2{margin-bottom:8px}
.bl{display:flex;justify-content:space-between;font-size:10px;margin-bottom:2px}
.bbg{height:5px;background:var(--border);border-radius:3px;overflow:hidden}
.bf{height:100%;border-radius:3px}
.ly{display:flex;flex-direction:column;gap:5px}
.lc{background:var(--card2);border:1px solid var(--border);border-radius:6px;padding:7px 9px;display:flex;align-items:center;gap:8px}
.lc .lt{font-size:11px;font-weight:700}.lc .ld{font-size:9px;color:var(--muted)}
.tn{background:rgba(245,158,11,.07);border:1px solid rgba(245,158,11,.18);border-radius:7px;padding:8px;font-size:10px;color:var(--muted);line-height:1.7}
.dt-tbl{width:100%;border-collapse:collapse;font-size:9px}
.dt-tbl th{background:var(--card2);padding:4px 5px;text-align:left;color:var(--accent);font-weight:700;border:1px solid var(--border);white-space:nowrap}
.dt-tbl td{padding:3px 5px;border:1px solid var(--border);color:var(--muted);max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rbox{background:var(--card2);border:1px solid var(--border);border-radius:7px;padding:8px;font-size:10px;color:var(--muted);line-height:1.7;white-space:pre-wrap;max-height:300px;overflow-y:auto}
</style>
</head>

  var h='<div class="sg"><div class="st-c"><div class="v">'+mods.length+'</div><div class="l">总模块</div></div><div class="st-c"><div class="v">'+t3+'</div><div class="l">三层完整</div></div><div class="st-c"><div class="v">'+tc+'</div><div class="l">CSV文件</div></div><div class="st-c"><div class="v">'+tr+'</div><div class="l">报告</div></div></div>';
  h+='<div class="dsec"><div class="dst">各阶段模块分布</div>';
  var mx=Math.max.apply(null,DATA.stages.map(function(x){return cm(x)}));
  DATA.stages.forEach(function(s){
    var c=cm(s);var p=mx>0?(c/mx*100):0;
    h+='<div class="bg2"><div class="bl"><span style="color:'+s.color+'">'+s.icon+' '+s.name+'</span><span>'+c+'模块</span></div><div class="bbg"><div class="bf" style="width:'+p+'%;background:'+s.color+'"></div></div></div>';
  });
  h+='</div><div class="dsec"><div class="dst">三元数据架构</div><div class="ly"><div class="lc"><span style="font-size:15px">&#128225;</span><div><div class="lt">raw/ 原始数据层</div><div class="ld">仪器输出原文，零处理</div></div></div><div class="lc"><span style="font-size:15px">&#9881;</span><div><div class="lt">processed/ 结构化层</div><div class="ld">CSV清洗，统计分析，含分析链</div></div></div><div class="lc"><span style="font-size:15px">&#128221;</span><div><div class="lt">report/ 知识层</div><div class="ld">关键发现与结论，实验记录本</div></div></div></div></div>';
  h+='<div class="tn" style="margin-top:8px"><strong style="color:#f59e0b">&#9888; 数字孪生声明</strong><br>本系统全部数据为数字孪生模拟（置信度75%），基于真实文献参数生成。真实实验完成后按三元闭环替换，声明自动失效。</div>';
  return h;
}

function renderDetail(){
  var m=getMod(S.mod);
  if(!m)return'<div style="color:var(--muted);text-align:center;padding:20px">点击模块查看详情</div>';
  var sc=m.scolor;
  var h='<div class="dsec"><div style="display:flex;gap:5px;margin-bottom:8px;flex-wrap:wrap"><span style="font-size:10px;padding:2px 8px;border-radius:5px;background:'+sc+'22;color:'+sc+';border:1px solid '+sc+'44">'+m.sid+' '+m.sname+'</span><span style="font-size:10px;padding:2px 8px;border-radius:5px;background:var(--card2);color:var(--muted);border:1px solid var(--border)">'+m.ssid+' '+m.ssname+'</span>'+(m.has3layer?'<span style="font-size:10px;padding:2px 8px;border-radius:5px;background:rgba(0,229,160,.12);color:#00e5a0;border:1px solid rgba(0,229,160,.25)">三层完整 &#10003;</span>':'')+'</div></div>';
  h+='<div class="dsec"><div class="dst">摘要</div><div class="dsb">'+esc(m.sum)+'</div></div>';
  if(m.sampleData&&m.sampleData.length>0){
    var hr=m.sampleHeaders||Object.keys(m.sampleData[0]);
    h+='<div class="dsec"><div class="dst">数据预览（前'+m.sampleData.length+'行）</div><div style="overflow-x:auto"><table class="dt-tbl"><tr>'+hr.map(function(x){return'<th>'+esc(x)+'</th>'}).join("")+'</tr>';
    m.sampleData.forEach(function(row){h+='<tr>'+hr.map(function(x){return'<td>'+esc(String(row[x]||"").substring(0,30))+'</td>'}).join("")+'</tr>'});
    h+='</table></div></div>';
  }
  if(m.files.length>0){
    h+='<div class="dsec"><div class="dst">数据文件（'+m.csvCount+'份CSV + '+m.reportCount+'份报告）</div><div class="ly">'+m.files.map(function(f){return'<div class="lc"><span>&#128196;</span><span class="lt" style="flex:1;font-family:monospace">'+esc(f)+'</span><span class="ld">CSV</span></div>'}).join("")+'</div></div>';
  }
  if(m.reportPreview){h+='<div class="dsec"><div class="dst">报告预览</div><div class="rbox">'+esc(m.reportPreview)+'</div></div>'}
  h+='<div class="dsec"><div class="dst">三层数据架构</div><div class="ly"><div class="lc"><span style="font-size:15px">&#128225;</span><div><div class="lt">raw/ 原始层</div><div class="ld">仪器原始输出（含质控元数据）</div></div></div><div class="lc"><span style="font-size:15px">&#9881;</span><div><div class="lt">processed/ 处理层</div><div class="ld">结构化CSV + 统计分析</div></div></div><div class="lc"><span style="font-size:15px">&#128221;</span><div><div class="lt">report/ 报告层</div><div class="ld">关键发现与结论</div></div></div></div></div>';
  return h;
}

function renderAbout(mods,tc,tr,t3){
  return'<div style="position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)" data-a="closeAbout"><div style="background:var(--card);border:1px solid var(--border);border-radius:14px;padding:22px;max-width:500px;width:90%;max-height:80vh;overflow-y:auto"><h2 style="font-size:16px;font-weight:800;margin-bottom:12px">竹沥双降片&#183;全流程数据治理系统 V3.0</h2><p style="font-size:11px;color:var(--accent);margin-bottom:8px">中药1.1类创新药 &#183; 痰瘀互结型高脂血症 &#183; 路径B&#39;双线并行</p><p style="font-size:11px;color:var(--muted);line-height:1.8;margin-bottom:8px">覆盖<strong style="color:var(--text)">立项&#8594;处方&#8594;CMC&#8594;GLP&#8594;IND&#8594;临床&#8594;NDA&#8594;上市</strong>全生命周期8阶段'+mods.length+'个模块。采用<strong style="color:var(--text)">三元闭环架构</strong>（raw&#8594;processed&#8594;report），'+tc+'份CSV + '+tr+'份报告，全部'+t3+'个模块三层完整。</p><div style="color:#f59e0b;background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.2);border-radius:6px;padding:8px 10px;font-size:11px;margin:10px 0">&#9888; 全部数据为数字孪生模拟（置信度75%），真实实验完成后按三元闭环替换。</div><button data-a="closeAbout" style="background:var(--card2);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:6px 16px;cursor:pointer;margin-top:12px;font-size:11px">知道了</button></div></div>';
}

// Event delegation
document.addEventListener("click",function(e){
  var el=e.target;
  while(el&&el!==document.body){
    var a=el.getAttribute&&el.getAttribute("data-a");
    if(a){
      var v=el.getAttribute("data-v");
      if(a==="tab"){S.tab=v;render();return}
      if(a==="toggle"){openStages[v]=openStages[v]===false;render();return}
      if(a==="mod"){S.mod=v;S.rt="detail";render();return}
      if(a==="rt"){S.rt=v;render();return}
      if(a==="flash"){S.tab=v;render();return}
      if(a==="about"){S.about=true;render();return}
      if(a==="closeAbout"){S.about=false;render();return}
    }
    el=el.parentNode;
  }
});
render();
</script>
</body>
</html>
